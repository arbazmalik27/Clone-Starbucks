<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Menu</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
    font-family: 'Poppins', sans-serif;
    background-color: #ffffff;
}

/* Sidebar */
.sidebar {
    padding: 30px;
    border-right: 1px solid #ddd;
}

.sidebar h6 {
    font-weight: bold;
    margin-top: 20px;
}

.sidebar ul {
    list-style: none;
    padding-left: 0;
}

.sidebar li {
    padding: 6px 0;
    cursor: pointer;
    color: #333;
}

.sidebar li:hover {
    color: #00754a;
}

/* Content */
.content {
    padding: 30px;
}

.section-title {
    font-weight: bold;
    margin: 30px 0 20px;
}

/* Menu Items */
.menu-row {
    margin-bottom: 40px;
}

.menu-item {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 25px;
}

.menu-item img {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    object-fit: cover;
}

.menu-item p {
    margin: 0;
    font-weight: 500;
}

    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-light bg-white border-bottom px-4">
    <span class="navbar-brand fw-bold">MENU</span>
    <div>
        <a href="#" class="nav-link d-inline">Rewards</a>
        <a href="#" class="nav-link d-inline">Gift Cards</a>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <aside class="col-md-3 sidebar">
            <h6>Drinks</h6>
            <ul>
                <li>Hot Coffee</li>
                <li>Cold Coffee</li>
                <li>Hot Tea</li>
                <li>Cold Tea</li>
            </ul>

            <h6>Food</h6>
            <ul>
                <li>Breakfast</li>
                <li>Bakery</li>
                <li>Lunch</li>
            </ul>

            <h6>At Home Coffee</h6>
            <ul>
                <li>Whole Bean</li>
                <li>Instant</li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="col-md-9 content">

            <!-- Drinks -->
            <h3 class="section-title">Drinks</h3>
            <div class="row menu-row">

                <div class="col-md-4 menu-item">
                    <img src="images/coffee1.jpg">
                    <p>Hot Coffee</p>
                </div>

                <div class="col-md-4 menu-item">
                    <img src="images/coffee2.jpg">
                    <p>Cold Coffee</p>
                </div>

                <div class="col-md-4 menu-item">
                    <img src="images/tea.jpg">
                    <p>Tea</p>
                </div>

            </div>

            <!-- Food -->
            <h3 class="section-title">Food</h3>
            <div class="row menu-row">

                <div class="col-md-4 menu-item">
                    <img src="images/food.jpg">
                    <p>Breakfast</p>
                </div>

                <div class="col-md-4 menu-item">
                    <img src="images/food.jpg">
                    <p>Bakery</p>
                </div>

                <div class="col-md-4 menu-item">
                    <img src="images/food.jpg">
                    <p>Lunch</p>
                </div>

            </div>

        </main>
    </div>
</div>

</body>
</html>
